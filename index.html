function mapExtToMode(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  const m={
    py:'python',
    js:'javascript',jsx:'javascript',mjs:'javascript',cjs:'javascript',
    ts:'text/typescript',tsx:'text/typescript',
    json:{name:'javascript',json:true},
    md:'markdown',mdx:'markdown',
    html:'htmlmixed',htm:'htmlmixed',xml:'xml',svg:'xml',
    css:'css',
    yaml:'yaml',yml:'yaml',
    sh:'shell',bash:'shell',
  };
  return m[ext]||'text/plain';
}

function cmFindNext(cm,query){
  if(!query)return null;
  let cur=cm.getSearchCursor(query,cm.getCursor('to'),{caseFold:true});
  if(cur.findNext()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  cur=cm.getSearchCursor(query,{line:0,ch:0},{caseFold:true});
  if(cur.findNext()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  return null;
}
function cmFindPrev(cm,query){
  if(!query)return null;
  let cur=cm.getSearchCursor(query,cm.getCursor('from'),{caseFold:true});
  if(cur.findPrevious()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  const ll=cm.lastLine();
  cur=cm.getSearchCursor(query,{line:ll,ch:cm.getLine(ll).length},{caseFold:true});
  if(cur.findPrevious()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  return null;
}
function cmCountMatches(cm,query){
  if(!query)return 0;
  let n=0;const cur=cm.getSearchCursor(query,{line:0,ch:0},{caseFold:true});
  while(cur.findNext())n++;
  return n;
}
function makeSearchOverlay(query){
  const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp(esc,'gi');
  return {token(stream){
    re.lastIndex=stream.pos;
    const m=re.exec(stream.string);
    if(m&&m.index===stream.pos){stream.pos+=m[0].length||1;return 'searching';}
    else if(m){stream.pos=m.index;}
    else{stream.skipToEnd();}
  }};
}

function CodeEditor({fileId,fileName,fileCode,dark,jumpTarget,searchQuery,onDirty,apiRef,saveKeyRef}){
  const hostRef=useRef(null);
  const cmRef=useRef(null);
  const docsRef=useRef(new Map());
  const overlayRef=useRef(null);
  const[err,setErr]=useState(null);

  useEffect(()=>{
    try{
      const cm=CodeMirror(hostRef.current,{
        lineNumbers:true,
        theme:dark?'material-darker':'eclipse',
        matchBrackets:true,
        autoCloseBrackets:true,
        styleActiveLine:true,
        indentWithTabs:false,
        indentUnit:4,
        tabSize:4,
        smartIndent:true,
        viewportMargin:60,
        extraKeys:{
          "Ctrl-S":()=>{saveKeyRef&&saveKeyRef.current&&saveKeyRef.current();return false;},
          "Cmd-S":()=>{saveKeyRef&&saveKeyRef.current&&saveKeyRef.current();return false;},
          "Backspace":(cm)=>{
            const cur=cm.getCursor();
            const line=cm.getLine(cur.line);
            const beforeCursor=line.slice(0,cur.ch);
            // Eğer cursor sadece boşluk/indent'in sonundaysa tüm indenti sil
            if(beforeCursor.trim()===""&&beforeCursor.length>0){
              const tabSize=cm.getOption("indentUnit")||4;
              const rem=beforeCursor.length%tabSize||tabSize;
              cm.replaceRange("",{line:cur.line,ch:cur.ch-rem},{line:cur.line,ch:cur.ch});
            } else {
              CodeMirror.commands.delCharBefore(cm);
            }
          },
        },
      });
      cmRef.current=cm;
      cm.on('change',()=>{ onDirty&&onDirty(); });
      if(apiRef)apiRef.current={
        getValue:()=>cm.getValue(),
        findNext:q=>cmFindNext(cm,q),
        findPrev:q=>cmFindPrev(cm,q),
        countMatches:q=>cmCountMatches(cm,q),
        focus:()=>cm.focus(),
      };
    }catch(e){ console.error("CodeMirror init hatası:",e); setErr(e); }
    return ()=>{ try{cmRef.current&&cmRef.current.toTextArea&&cmRef.current.toTextArea();}catch(e){} };
  },[]);

  useEffect(()=>{ try{ cmRef.current&&cmRef.current.setOption('theme',dark?'material-darker':'eclipse'); }catch(e){} },[dark]);

  useEffect(()=>{
    try{
      const cm=cmRef.current;
      if(!cm)return;
      let entry=docsRef.current.get(fileId);
      if(!entry){
        const mode=mapExtToMode(fileName||'');
        const doc=CodeMirror.Doc(fileCode||'',mode);
        entry={doc};
        docsRef.current.set(fileId,entry);
      }
      cm.swapDoc(entry.doc);
      requestAnimationFrame(()=>{ try{cm.refresh();}catch(e){} });
    }catch(e){ console.error("Doküman yükleme hatası:",e); setErr(e); }
  },[fileId]);

  useEffect(()=>{
    try{
      const cm=cmRef.current;
      if(!cm||!jumpTarget)return;
      requestAnimationFrame(()=>{
        try{
          cm.refresh();
          const ln=Math.max(0,jumpTarget.line-1);
          cm.setCursor({line:ln,ch:0});
          cm.scrollIntoView({line:ln,ch:0},120);
          cm.addLineClass(ln,'background','cm-jump-flash');
          setTimeout(()=>{try{cm.removeLineClass(ln,'background','cm-jump-flash');}catch(e){}},1300);
          cm.focus();
        }catch(e){ console.error("Satıra atlama hatası:",e); }
      });
    }catch(e){}
  },[jumpTarget]);

  useEffect(()=>{
    try{
      const cm=cmRef.current;
      if(!cm)return;
      if(overlayRef.current){cm.removeOverlay(overlayRef.current);overlayRef.current=null;}
      if(searchQuery){
        const ov=makeSearchOverlay(searchQuery);
        cm.addOverlay(ov);
        overlayRef.current=ov;
      }
    }catch(e){ console.error("Arama vurgulama hatası:",e); }
  },[searchQuery,fileId]);

  if(err){
    return React.createElement("div",{style:{padding:16,fontSize:12,color:"#F87171",lineHeight:1.6}},
      "Bu dosya için kod editörü yüklenemedi.",React.createElement("br"),
      React.createElement("span",{style:{fontFamily:"monospace",fontSize:11,color:"#8B949E"}},String(err.message||err))
    );
  }
  return React.createElement("div",{ref:hostRef,className:"cm-editor-host"});
}

// ── Markdown-benzeri mesaj renderer ─────────────────────
function MsgRenderer({content,dark,t}){
  const[copied,setCopied]=useState(null);
  const copyCode=(code,idx)=>{
    navigator.clipboard.writeText(code).then(()=>{
      setCopied(idx);
      setTimeout(()=>setCopied(null),1500);
    });
  };

  // Bloklara ayır: kod bloğu | normal metin
  const parts=[];
  const codeRe=/```(\w*)\n?([\s\S]*?)```/g;
  let last=0,m,idx=0;
  while((m=codeRe.exec(content))!==null){
    if(m.index>last) parts.push({type:"text",text:content.slice(last,m.index)});
    parts.push({type:"code",lang:m[1]||"",code:m[2].trimEnd(),idx:idx++});
    last=m.index+m[0].length;
  }
  if(last<content.length) parts.push({type:"text",text:content.slice(last)});

  // Satır içi bold: **text**
  const renderText=(text)=>{
    const nodes=[];
    const boldRe=/\*\*(.*?)\*\*/g;
    let lt=0,bm;
    while((bm=boldRe.exec(text))!==null){
      if(bm.index>lt) nodes.push(text.slice(lt,bm.index));
      nodes.push(React.createElement("strong",{key:bm.index},bm[1]));
      lt=bm.index+bm[0].length;
    }
    if(lt<text.length) nodes.push(text.slice(lt));
    return nodes;
  };

  // ### başlıklar ve normal satırlar
  const renderLines=(text)=>{
    return text.split("\n").map((line,i)=>{
      if(/^###\s+/.test(line)){
        return React.createElement("div",{key:i,style:{fontWeight:700,fontSize:13,marginTop:i===0?0:10,marginBottom:2,color:t.text}},line.replace(/^###\s+/,""));
      }
      if(/^##\s+/.test(line)){
        return React.createElement("div",{key:i,style:{fontWeight:700,fontSize:13.5,marginTop:i===0?0:10,marginBottom:2,color:t.text}},line.replace(/^##\s+/,""));
      }
      if(/^#\s+/.test(line)){
        return React.createElement("div",{key:i,style:{fontWeight:700,fontSize:14,marginTop:i===0?0:10,marginBottom:4,color:t.text}},line.replace(/^#\s+/,""));
      }
      if(line.trim()==="") return React.createElement("div",{key:i,style:{height:6}});
      return React.createElement("div",{key:i,style:{lineHeight:1.6}},renderText(line));
    });
  };

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:4}},
    parts.map((p,pi)=>{
      if(p.type==="code"){
        const codeId=pi;
        return React.createElement("div",{key:pi,style:{
          background:dark?"#0D1117":"#F0F2F5",
          border:`1px solid ${dark?"#30363D":"#D0D7DE"}`,
          borderRadius:8,overflow:"hidden",marginTop:4,marginBottom:4
        }},
          React.createElement("div",{style:{
            display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"4px 10px",background:dark?"#161B22":"#E8EAED",
            borderBottom:`1px solid ${dark?"#30363D":"#D0D7DE"}`
          }},
            React.createElement("span",{style:{fontSize:10,color:t.dim,fontFamily:"monospace"}},p.lang||"code"),
            React.createElement("button",{
              onClick:()=>copyCode(p.code,codeId),
              style:{fontSize:10,color:copied===codeId?"#10B981":t.sub,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",borderRadius:4,
                background:copied===codeId?"#10B98115":"transparent"}
            },copied===codeId?"Kopyalandı":"Kopyala")
          ),
          React.createElement("pre",{style:{
            margin:0,padding:"10px 12px",overflowX:"auto",fontSize:12,
            fontFamily:"'JetBrains Mono','Fira Code',monospace",
            color:dark?"#E6EDF3":"#1C2128",lineHeight:1.6,
            userSelect:"text",cursor:"text",whiteSpace:"pre-wrap",wordBreak:"break-all"
          }},p.code)
        );
      }
      return React.createElement("div",{key:pi},renderLines(p.text));
    })
  );
}

// ── Yapay zeka yanıtından JSON çıkarma yardımcıları ──────
// Modelin (özellikle küçük/yerel modellerin) yanıtı "SADECE JSON döndür" talimatına
// tam uymayıp önce kod/açıklama yazıp JSON'u en sona koyduğu durumlar var. Bu yüzden
// "ilk [ ... ilk eşleşen ]" aramak yanlış parçayı (örn. yanıttaki bir Python listesini/
// tuple dizisini) yakalayabilir. Bunun önüne geçmek için metindeki HER "[" / "{" başlangıcından
// dengeli bir aralık çıkarıp (string içeriğini atlayarak), her adayı JSON.parse ile deneyip
// beklenen şekle (örn. "title" alanı olan bir dizi) uyan İLK adayı kullanıyoruz.
function findJsonCandidates(text, openCh, closeCh){
  const out=[];
  for(let i=0;i<text.length;i++){
    if(text[i]!==openCh) continue;
    let depth=0, inStr=false, strCh='', esc=false, end=-1;
    for(let j=i;j<text.length;j++){
      const ch=text[j];
      if(inStr){
        if(esc){ esc=false; }
        else if(ch==='\\'){ esc=true; }
        else if(ch===strCh){ inStr=false; }
        continue;
      }
      if(ch==='"'||ch==="'"){ inStr=true; strCh=ch; continue; }
      if(ch===openCh) depth++;
      else if(ch===closeCh){ depth--; if(depth===0){ end=j; break; } }
    }
    if(end!==-1) out.push(text.slice(i,end+1));
  }
  return out;
}
function parseJsonWithValidator(text, openCh, closeCh, validate){
  for(const candidate of findJsonCandidates(text||"", openCh, closeCh)){
    try{
      const parsed=JSON.parse(candidate);
      if(validate(parsed)) return parsed;
    }catch(e){ /* bu aday geçersiz, sıradakini dene */ }
  }
  return null;
}

// ── AI Paneli ─────────────────────────────────────────────
function AiPanel({open,onClose,dark,t,aiConfig,onOpenSettings,selFile}){
  const[input,setInput]=useState("");
  const[sending,setSending]=useState(false);
  const[mode,setMode]=useState("chat"); // "chat" | "learn"
  const[view,setView]=useState("chat"); // "chat" | "history"
  // Her mod için ayrı mesaj geçmişi
  const[modeMessages,setModeMessages]=useState({chat:[],learn:[]});
  const messages=modeMessages[mode];
  const setMessages=(newMsgs)=>setModeMessages(prev=>({...prev,[mode]:newMsgs}));
  const setMessagesForMode=(targetMode,newMsgs)=>setModeMessages(prev=>({...prev,[targetMode]:newMsgs}));
  // Sohbet geçmişi: [{id, mode, title, messages, createdAt}]
  const[history,setHistory]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("ai_history")||"[]"); }catch(e){ return []; }
  });
  const[activeChatId,setActiveChatId]=useState(null);
  const[learnState,setLearnState]=useState({phase:"idle",topic:"",steps:[],currentStep:0,stepStatuses:[],stepLesson:"",validationMsg:""});
  const[learnInput,setLearnInput]=useState("");
  const[learnGranularity,setLearnGranularity]=useState("normal"); // "normal" | "atomic"
  const[learnLoading,setLearnLoading]=useState(false);
  const listRef=useRef(null);
  const learnAbortRef=useRef(0); // her initLearnPlan başlangıcında artar, stale async'leri iptal eder

  // Geçmişi localStorage'a kaydet
  useEffect(()=>{
    try{ localStorage.setItem("ai_history",JSON.stringify(history)); }catch(e){}
  },[history]);

  useEffect(()=>{ if(listRef.current)listRef.current.scrollTop=listRef.current.scrollHeight; },[messages,sending]);

  const buildSystemPrompt=()=>{
    if(mode==="learn"){
      return `Sen deneyimli bir yazılım eğitmeni ve mentorsun. Kullanıcı senden bir şey öğrenmek istiyor.

ÖĞRETME KURALLARI (ASLA İHLAL ETME):
1. Konuyu adımlara böl. Her mesajda yalnızca BİR adım ver.
2. Adımda: ne yapılacağını açıkla, neye yaradığını söyle, kodu göster (varsa).
3. Adımın sonunda HER ZAMAN şunu yaz: "Kodu yazdın mı? Hazır olduğunda 'devam' yaz."
4. Kullanıcı 'devam' veya benzeri bir şey yazarsa:
   a) Eğer önceki adımda kod vardı: kullanıcının kodu doğru yazıp yazmadığını düşün. Eğer hata yapmış gibi görünüyorsa uyar, yoksa "Harika! Devam edelim." de.
   b) Bir sonraki adıma geç.
5. Asla birden fazla adımı aynı anda verme.
6. Kod bloklarını her zaman \`\`\`dil ... \`\`\` formatında yaz.
7. Türkçe cevap ver. Emoji kullanma.`;
    }
    return `Sen yardımsever bir yazılım geliştirme asistanısın. Türkçe cevap ver. Emoji kullanma. Kod bloklarını her zaman \`\`\`dil ... \`\`\` formatında yaz.`;
  };

  // Aktif sohbeti geçmişe kaydet/güncelle
  const saveToHistory=(msgs,currentMode,chatId)=>{
    if(!msgs||msgs.length===0)return chatId;
    const firstUserMsg=msgs.find(m=>m.role==="user");
    if(!firstUserMsg)return chatId;
    const title=firstUserMsg.content.slice(0,60)+(firstUserMsg.content.length>60?"…":"");
    if(chatId){
      setHistory(h=>h.map(c=>c.id===chatId?{...c,messages:msgs,title}:c));
      return chatId;
    } else {
      const newId=Date.now().toString();
      const entry={id:newId,mode:currentMode,title,messages:msgs,createdAt:new Date().toISOString()};
      setHistory(h=>[entry,...h.slice(0,49)]);
      return newId;
    }
  };

  const send=async(text)=>{
    const content=(text??input).trim();
    if(!content||!aiConfig||sending)return;
    const next=[...messages,{role:"user",content}];
    setMessages(next);setInput("");setSending(true);
    try{
      const res=await window.electronAPI.aiChat({
        provider:aiConfig.provider,baseUrl:aiConfig.baseUrl,model:aiConfig.model,
        messages:next,system:buildSystemPrompt()
      });
      const withReply=res?.ok
        ?[...next,{role:"assistant",content:res.content||"(boş yanıt)"}]
        :[...next,{role:"assistant",content:`Hata: ${res?.error||"bağlantı kurulamadı"}`,isError:true}];
      setMessages(withReply);
      const newId=saveToHistory(withReply,mode,activeChatId);
      if(!activeChatId)setActiveChatId(newId);
    }catch(e){
      const withErr=[...next,{role:"assistant",content:`Hata: ${e.message}`,isError:true}];
      setMessages(withErr);
    }
    setSending(false);
  };

  const startLearn=()=>{
    setMode("learn");
    // Zaten aktif bir plan varsa sıfırlama
    setLearnState(prev=>{
      if(prev.phase==="steps"||prev.phase==="loading"||prev.phase==="validating")return prev;
      return {phase:"idle",topic:"",steps:[],currentStep:0,stepStatuses:[],stepLesson:"",validationMsg:""};
    });
  };

  const newChat=(forMode)=>{
    setMessages([]);
    setActiveChatId(null);
    setInput("");
    if(forMode) setMode(forMode);
  };

  const loadChat=(entry)=>{
    setMessagesForMode(entry.mode,entry.messages);
    setMode(entry.mode);
    setActiveChatId(entry.id);
    setView("chat");
    // Öğrenme modunda geçmişten yüklenince learnState'i "history" yap
    // ki adım UI'ı yerine mesaj listesi gösterilsin
    if(entry.mode==="learn"){
      setLearnState({phase:"history",topic:"",steps:[],currentStep:0,stepStatuses:[],stepLesson:"",validationMsg:""});
    }
  };

  const deleteChat=(id,e)=>{
    e.stopPropagation();

  // ── Öğrenme modu: plan oluştur ──────────────────────────
  // Sonraki adımlar için ders al (tek çağrı)
  const getStepLesson=async(topic,steps,stepIdx)=>{
    const step=steps[stepIdx];
    const sys=`Yazılım eğitmenisin. Konu:"${topic}" Adım ${stepIdx+1}/${steps.length}:"${step.title}". Kısaca açıkla, kodu göster. Türkçe. Emoji yok. \`\`\`dil...\`\`\``;
    const res=await window.electronAPI.aiChat({
      provider:aiConfig.provider,baseUrl:aiConfig.baseUrl,model:aiConfig.model,
      messages:[{role:"user",content:`${topic} — Adım ${stepIdx+1}: ${step.title}`}],
      system:sys,
    });
    return res?.ok?(res.content||""):"İçerik yüklenemedi.";
  };

  const granularityRules=(g)=>g==="atomic"
    ? `8-16 ince adım, Türkçe, her adım tek işlem (1 import/atama/fonksiyon). Pratik sıra.`
    : `max 7 adım, Türkçe, pratik sıra.`;

  const parsePlanSteps=(content)=>{
    const steps=parseJsonWithValidator(content,'[',']',
      v=>Array.isArray(v)&&v.length>0&&v.some(s=>s&&typeof s==='object'&&typeof s.title==='string'));
    if(!steps) throw new Error("Yanıtta geçerli bir adım listesi bulunamadı");
    const cleaned=steps.filter(s=>s&&typeof s==='object'&&s.title).map((s,i)=>({id:i+1,title:String(s.title),brief:s.brief?String(s.brief):""}));
    if(cleaned.length===0) throw new Error("Geçerli adım bulunamadı");
    return cleaned;
  };

  // Plan + ilk ders tek çağrıda — iki ayrı AI isteği yerine bir tane
  const initPlanAndFirstLesson=async(topic,granularity,retryJson)=>{
    const granRules=granularityRules(granularity);
    const sys=retryJson
      ? `Eğitmensin. SADECE aşağıdaki JSON formatında yanıt ver, başka hiçbir şey yazma:
{"steps":[{"id":1,"title":"...","brief":"..."},...],"lesson":"ilk adımın açıklaması ve kodu"}
${granRules}`
      : `Eğitmensin. Konu için öğrenme planı ve ilk adımın dersini tek seferde ver.
SADECE JSON döndür, başka hiçbir şey yazma:
{"steps":[{"id":1,"title":"...","brief":"..."},...],"lesson":"ilk adımın açıklaması ve kodu"}
${granRules}
lesson alanı: ilk adımı Türkçe açıkla, kodu göster, emoji kullanma.`;
    const res=await window.electronAPI.aiChat({
      provider:aiConfig.provider,baseUrl:aiConfig.baseUrl,model:aiConfig.model,
      messages:[{role:"user",content:topic}],
      system:sys,
    });
    if(!res?.ok) throw new Error(res?.error||"bağlantı hatası");
    const parsed=parseJsonWithValidator(res.content||"",'{','}',
      v=>v&&typeof v==='object'&&Array.isArray(v.steps)&&v.steps.length>0&&typeof v.lesson==='string');
    if(!parsed) throw new Error("plan+ders formatı ayrıştırılamadı");
    const steps=parsePlanSteps(JSON.stringify(parsed.steps));
    return {steps, lesson:parsed.lesson||"İçerik yüklenemedi."};
  };

  const initLearnPlan=async(topic,granularity)=>{
    const myToken=++learnAbortRef.current;
    setLearnState(s=>({...s,phase:"loading",topic,validationMsg:""}));
    try{
      let steps, lesson;
      try{
        ({steps,lesson}=await initPlanAndFirstLesson(topic,granularity,false));
      }catch(e1){
        if(learnAbortRef.current!==myToken)return;
        try{
          ({steps,lesson}=await initPlanAndFirstLesson(topic,granularity,true));
        }catch(e2){
          throw new Error(`"${aiConfig.model}" modeli planı geçerli JSON formatında oluşturamadı. Tekrar deneyin veya ayarlardan farklı bir model seçin.`);
        }
      }
      if(learnAbortRef.current!==myToken)return;
      const statuses=steps.map((_,i)=>i===0?"current":"pending");
      setLearnState({phase:"steps",topic,steps,currentStep:0,stepStatuses:statuses,stepLesson:lesson,validationMsg:""});
      const initMsgs=[
        {role:"user",content:`Öğrenme planı: ${topic}`},
        {role:"assistant",content:`Plan oluşturuldu (${steps.length} adım):\n${steps.map((s,i)=>`${i+1}. ${s.title}`).join('\n')}\n\n**Adım 1: ${steps[0].title}**\n\n${lesson}`}
      ];
      const newId=saveToHistory(initMsgs,"learn",null);
      setActiveChatId(newId);
    }catch(e){
      if(learnAbortRef.current!==myToken)return;
      setLearnState(s=>({...s,phase:"idle",validationMsg:"Hata: "+e.message}));
    }
  };

  const validateAndAdvance=async(nextIdx)=>{
    const{topic,steps,currentStep,stepStatuses}=learnState;
    if(!selFile?.code){
      setLearnState(s=>({...s,validationMsg:"Önce düzenleyicide bir dosya açın."}));
      return;
    }
    setLearnState(s=>({...s,phase:"validating",validationMsg:""}));
    const curStep=steps[currentStep];
    const isLastStep=currentStep===steps.length-1;

    // Normalize code: strip trailing whitespace/blank lines for comparison
    const normalizeCode=(c)=>c.split('\n').map(l=>l.trimEnd()).join('\n').replace(/\n{3,}/g,'\n\n').trim();

    const sys=`Eğitmensin. Adım:"${curStep.title}" Dosya:${selFile.name}
\`\`\`
${normalizeCode(selFile.code).slice(0,1500)}
\`\`\`
Bu adım implemente edilmiş mi? Boşluk/yorum farkı önemsiz. SADECE JSON:
{"valid":true,"feedback":"..."} veya {"valid":false,"feedback":"..."}`;
    try{
      const res=await window.electronAPI.aiChat({
        provider:aiConfig.provider,baseUrl:aiConfig.baseUrl,model:aiConfig.model,
        messages:[{role:"user",content:"Kodu kontrol et"}],
        system:sys,
      });
      if(!res?.ok) throw new Error(res?.error||"bağlantı hatası");
      let result;
      try{
        result=parseJsonWithValidator(res.content||"",'{','}',
          v=>v&&typeof v==='object'&&typeof v.valid==='boolean');
        if(!result) throw new Error("Yanıtta geçerli JSON nesnesi bulunamadı");
      }catch(e){ throw new Error("Yanıt ayrıştırılamadı"); }
      if(result.valid){
        const newStatuses=[...stepStatuses];
        newStatuses[currentStep]="done";
        if(isLastStep){
          // Son adım tamamlandı — tüm adımlar done, bitirme ekranı göster
          setLearnState({...learnState,phase:"steps",currentStep,stepStatuses:newStatuses,stepLesson:learnState.stepLesson,
            validationMsg:"✓ "+steps[currentStep].title+" tamamlandı. Tüm adımları bitirdin!"});
          const learnMsgs=[
            {role:"user",content:`Öğrenme: ${topic}`},
            {role:"assistant",content:`Son adım tamamlandı: ${steps[currentStep].title}\n\nTüm adımlar başarıyla tamamlandı!`}
          ];
          const savedId=saveToHistory(learnMsgs,"learn",activeChatId);
          if(!activeChatId)setActiveChatId(savedId);
        }else{
          newStatuses[nextIdx]="current";
          const lesson=await getStepLesson(topic,steps,nextIdx);
          const newLearnState={...learnState,phase:"steps",currentStep:nextIdx,stepStatuses:newStatuses,stepLesson:lesson,
            validationMsg:"✓ "+steps[currentStep].title+" tamamlandı."};
          setLearnState(newLearnState);
          // Öğrenme ilerlemesini geçmişe kaydet
          const learnMsgs=[
            {role:"user",content:`Öğrenme: ${topic}`},
            {role:"assistant",content:`Adım ${currentStep+1} tamamlandı: ${steps[currentStep].title}\n\nSonraki adım (${nextIdx+1}): ${steps[nextIdx].title}\n\n${lesson}`}
          ];
          const savedId=saveToHistory(learnMsgs,"learn",activeChatId);
          if(!activeChatId)setActiveChatId(savedId);
        }
      }else{
        setLearnState(s=>({...s,phase:"steps",validationMsg:"✗ "+(result.feedback||"Kod doğru değil, lütfen düzeltin.")}));
      }
    }catch(e){
      setLearnState(s=>({...s,phase:"steps",validationMsg:"Hata: "+e.message}));
    }
  };

// ── Context Menu ─────────────────────────────────────────
function ContextMenu({x,y,items,onClose}){
  const ref=useRef(null);
  const[pos,setPos]=useState({x,y,ready:false});
  useEffect(()=>{
    const handler=(e)=>{ if(ref.current&&!ref.current.contains(e.target))onClose(); };
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[]);
  useEffect(()=>{
    if(!ref.current)return;
    const {offsetWidth:w,offsetHeight:h}=ref.current;
    const vw=window.innerWidth,vh=window.innerHeight;
    const nx=x+w>vw?Math.max(0,vw-w-6):x;
    const ny=y+h>vh?Math.max(0,vh-h-6):y;
    setPos({x:nx,y:ny,ready:true});
  },[x,y]);
  return React.createElement("div",{ref,style:{
    position:"fixed",left:pos.x,top:pos.y,zIndex:9999,
    background:"#1C2128",border:"1px solid #30363D",borderRadius:7,padding:"4px 0",
    boxShadow:"0 8px 24px rgba(0,0,0,0.4)",minWidth:160,userSelect:"none",
    visibility:pos.ready?"visible":"hidden"
  }},
    items.map((item,i)=>item===null
      ? React.createElement("div",{key:i,style:{height:1,background:"#30363D",margin:"3px 0"}})
      : React.createElement("div",{key:i,onClick:()=>{item.action();onClose();},
          style:{padding:"6px 12px",fontSize:12,color:item.danger?"#EF4444":"#E6EDF3",cursor:"pointer",
            display:"flex",alignItems:"center",gap:8,
            transition:"background 0.1s"},
          onMouseEnter:e=>e.currentTarget.style.background="#21262D",
          onMouseLeave:e=>e.currentTarget.style.background="transparent"
        },
        item.icon&&React.createElement("span",{style:{opacity:0.7,fontSize:11}},item.icon),
        item.label
      )
    )
  );
}

// ── Terminal Panel ────────────────────────────────────────
function TerminalPanel({dark,t,selFile,open,onToggle}){
  const[lines,setLines]=useState([{type:"info",text:"Terminal hazır. Komut girin..."}]);
  const[input,setInput]=useState("");
  const[history,setHistory]=useState([]);
  const[histIdx,setHistIdx]=useState(-1);
  const[running,setRunning]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{ if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"}); },[lines]);

  const runCommand=async(cmd)=>{
    const trimmed=cmd.trim();
    if(!trimmed)return;
    setLines(l=>[...l,{type:"cmd",text:"$ "+trimmed}]);
    setHistory(h=>[trimmed,...h.filter(x=>x!==trimmed)].slice(0,50));
    setHistIdx(-1);
    setInput("");
    setRunning(true);
    try{
      if(window.electronAPI&&window.electronAPI.runCommand){
        const res=await window.electronAPI.runCommand(trimmed);
        if(res.stdout)setLines(l=>[...l,{type:"out",text:res.stdout}]);
        if(res.stderr)setLines(l=>[...l,{type:"err",text:res.stderr}]);
        if(!res.stdout&&!res.stderr)setLines(l=>[...l,{type:"info",text:"(çıktı yok)"}]);
      } else {
        setLines(l=>[...l,{type:"err",text:"electronAPI.runCommand mevcut değil. Electron main process'e ekleyin."}]);
      }
    }catch(e){
      setLines(l=>[...l,{type:"err",text:"Hata: "+e.message}]);
    }
    setRunning(false);
    setTimeout(()=>inputRef.current?.focus(),50);
  };

  const runFile=async()=>{
    if(!selFile?.path)return;
    const ext=(selFile.name.split('.').pop()||'').toLowerCase();
    const cmds={py:`python "${selFile.path}"`,js:`node "${selFile.path}"`,ts:`ts-node "${selFile.path}"`,sh:`bash "${selFile.path}"`};
    const cmd=cmds[ext];
    if(!cmd){setLines(l=>[...l,{type:"err",text:`Bu dosya tipi çalıştırılamıyor: .${ext}`}]);return;}
    await runCommand(cmd);
  };

  const clearTerminal=()=>setLines([{type:"info",text:"Terminal temizlendi."}]);

  if(!open)return null;
  return React.createElement("div",{style:{
    height:220,flexShrink:0,borderTop:`1px solid ${t.border}`,background:dark?"#0A0D12":"#F0F2F5",
    display:"flex",flexDirection:"column",overflow:"hidden"
  }},
    // Terminal başlık
    React.createElement("div",{style:{
      display:"flex",alignItems:"center",padding:"0 10px",height:30,
      borderBottom:`1px solid ${t.border}`,background:t.surf,flexShrink:0,gap:6
    }},
      React.createElement("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:t.accent,strokeWidth:2},
        React.createElement("polyline",{points:"4 17 10 11 4 5"}),React.createElement("line",{x1:12,y1:19,x2:20,y2:19})
      ),
      React.createElement("span",{style:{fontSize:10,fontWeight:600,color:t.sub,textTransform:"uppercase",letterSpacing:"0.05em",flex:1}},"Terminal"),
      selFile&&React.createElement("button",{
        onClick:runFile,disabled:running,
        title:`${selFile.name} dosyasını çalıştır`,
        style:{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",fontSize:10,borderRadius:4,
          background:"#10B98120",border:"1px solid #10B98150",color:"#10B981",cursor:"pointer",fontFamily:"inherit"}
      },
        React.createElement("svg",{width:9,height:9,viewBox:"0 0 24 24",fill:"#10B981"},React.createElement("polygon",{points:"5 3 19 12 5 21 5 3"})),
        running?"Çalışıyor...":"Çalıştır"
      ),
      React.createElement("button",{onClick:clearTerminal,title:"Temizle",
        style:{fontSize:10,color:t.dim,padding:"2px 6px",borderRadius:4,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}},"Temizle"),
      React.createElement("button",{onClick:onToggle,style:{display:"flex",color:t.dim,background:"none",border:"none",cursor:"pointer"}},
        React.createElement("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2},React.createElement("line",{x1:18,y1:6,x2:6,y2:18}),React.createElement("line",{x1:6,y1:6,x2:18,y2:18}))
      )
    ),
    // Çıktı
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"6px 10px",fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:11.5},
      onClick:()=>inputRef.current?.focus()
    },
      lines.map((l,i)=>React.createElement("div",{key:i,style:{
        lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-all",
        color:l.type==="cmd"?t.accent:l.type==="err"?"#EF4444":l.type==="info"?t.dim:dark?"#E6EDF3":"#1C2128"
      }},l.text)),
      running&&React.createElement("div",{style:{color:t.dim,animation:"pulse 1s infinite"}},". . ."),
      React.createElement("div",{ref:bottomRef})
    ),
    // Input
    React.createElement("div",{style:{
      display:"flex",alignItems:"center",gap:6,padding:"4px 10px",
      borderTop:`1px solid ${t.border}`,background:t.surf,flexShrink:0
    }},
      React.createElement("span",{style:{color:t.accent,fontSize:12,fontFamily:"monospace",flexShrink:0}},"$"),
      React.createElement("input",{ref:inputRef,value:input,onChange:e=>setInput(e.target.value),
        disabled:running,
        placeholder:"komut girin...",
        style:{flex:1,fontSize:12,fontFamily:"'JetBrains Mono','Fira Code',monospace",color:t.text,background:"none",border:"none",outline:"none"},
        onKeyDown:e=>{
          if(e.key==="Enter"&&!running){e.preventDefault();runCommand(input);}
          if(e.key==="ArrowUp"){e.preventDefault();const ni=Math.min(histIdx+1,history.length-1);setHistIdx(ni);if(history[ni])setInput(history[ni]);}
          if(e.key==="ArrowDown"){e.preventDefault();const ni=Math.max(histIdx-1,-1);setHistIdx(ni);setInput(ni===-1?"":history[ni]||"");}
          if(e.key==="l"&&e.ctrlKey){e.preventDefault();clearTerminal();}
        }
      })
    )
  );
}

// ── Dosya Ağacı Bileşeni ─────────────────────────────────
function FileTree({files,selFile,pickFile,dark,t,projectName,createdFolders,rootPath,onCreateFile,onCreateFolder,onRename,onDelete,onRenameFolder,onDeleteFolder}){
  const[expandedDirs,setExpandedDirs]=useState(new Set());
  const[creating,setCreating]=useState(null); // {type:'file'|'folder', parentPath:string}
  const[newName,setNewName]=useState("");
  const[renamingId,setRenamingId]=useState(null);
  const[renamingFolderPath,setRenamingFolderPath]=useState(null);
  const[renameVal,setRenameVal]=useState("");
  const[ctxMenu,setCtxMenu]=useState(null); // {x,y,type:'file'|'folder',item}
  const newNameRef=useRef(null);
  const renameRef=useRef(null);

  useEffect(()=>{ if(creating&&newNameRef.current){ setTimeout(()=>newNameRef.current?.focus(),30); } },[creating]);
  useEffect(()=>{ if(renamingId&&renameRef.current){ setTimeout(()=>renameRef.current?.focus(),30); } },[renamingId]);
  useEffect(()=>{ if(renamingFolderPath&&renameRef.current){ setTimeout(()=>renameRef.current?.focus(),30); } },[renamingFolderPath]);

  // Bir dosyanın mutlak yolunu, açılan proje köküne (rootPath) göre parçalara ayırır.
  // Önceden tüm mutlak yol (örn. "D:/a/proje/src/x.js") ağaca aktarılıyordu; bu da
  // sürücü harfi ve proje kökünün üstündeki klasörlerin (örn. "D:", "a") sahte ağaç
  // düğümleri olarak görünmesine ve bu düğümlerde dosya/klasör oluştururken yanlış,
  // projenin dışında bir mutlak yola yazılmasına yol açıyordu (örn. EISDIR hatası).
  // Artık sadece rootPath'in İÇİNDEKİ parçalar düğüm olur; her düğümün path'i yine
  // diskteki gerçek mutlak yol olarak tutulur (rename/delete/showInFolder vs. bozulmasın).
  const rp=(rootPath||'').replace(/\\/g,'/').replace(/\/+$/,'');
  const splitRelative=(absPath)=>{
    const norm=(absPath||'').replace(/\\/g,'/');
    if(rp&&(norm===rp||norm.startsWith(rp+'/'))){
      return {base:rp,parts:norm.slice(rp.length).split('/').filter(Boolean)};
    }
    // rootPath yoksa (örn. tek dosya açma modu) eski davranış: tüm mutlak yolu kullan
    return {base:'',parts:norm.split('/').filter(Boolean)};
  };

  // Klasör açıldığında root seviyesini expand et
  useEffect(()=>{
    if(files.length>0){
      const rootDirs=new Set();
      files.forEach(f=>{
        const{base,parts}=splitRelative(f.path);
        if(parts.length>1) rootDirs.add(base?`${base}/${parts[0]}`:parts[0]);
      });
      setExpandedDirs(prev=>{
        const merged=new Set([...prev,...rootDirs]);
        return merged;
      });
    }
  },[files.length,rootPath]);

  // Ağaç yapısı oluştur
  const buildTree=(fileList,extraFolders)=>{
    const root={name:'',path:'',children:{},files:[]};
    // Boş oluşturulan klasörleri ağaca ekle
    if(extraFolders){
      for(const fp of extraFolders){
        const{base,parts}=splitRelative(fp);
        let node=root;
        for(let i=0;i<parts.length;i++){
          const seg=parts[i];
          const rel=parts.slice(0,i+1).join('/');
          const np=base?`${base}/${rel}`:rel;
          if(!node.children[seg])node.children[seg]={name:seg,path:np,children:{},files:[]};
          node=node.children[seg];
        }
      }
    }
    fileList.forEach(f=>{
      const{base,parts}=splitRelative(f.path);
      let node=root;
      for(let i=0;i<parts.length-1;i++){
        const seg=parts[i];
        const rel=parts.slice(0,i+1).join('/');
        const np=base?`${base}/${rel}`:rel;
        if(!node.children[seg]) node.children[seg]={name:seg,path:np,children:{},files:[]};
        node=node.children[seg];
      }
      node.files.push(f);
    });
    return root;
  };

  const tree=useMemo(()=>buildTree(files,createdFolders),[files,createdFolders,rootPath]);

  const toggleDir=(path)=>setExpandedDirs(prev=>{

  });

  const openCtxMenu=(e,type,item)=>{

  const commitCreate=()=>{

  };

      setRenamingFolderPath(null);setRenameVal("");
      return;
    }
    if(!renamingId)return;

  const cancelRename=()=>{ setRenamingId(null);setRenamingFolderPath(null);setRenameVal(""); };

  const startCreate=(type,parentPath)=>{

    if(parentPath) setExpandedDirs(prev=>{ const n=new Set(prev);n.add(parentPath);return n; });
    setCreating({type,parentPath:parentPath||''});
    setNewName("");
  };

  const FolderIcon=({open})=>React.createElement("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:open?"rgba(124,58,237,0.25)":"none",stroke:open?"#7C3AED":t.sub,strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"},
    React.createElement("path",{d:"M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"})
  );
  const FileIconSm=({color})=>React.createElement("svg",{width:11,height:13,viewBox:"0 0 24 24",fill:"none",stroke:color||t.sub,strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"},
    React.createElement("path",{d:"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"}),
    React.createElement("polyline",{points:"14 2 14 8 20 8"})
  );
  const ChevronIcon=({open})=>React.createElement("svg",{width:10,height:10,viewBox:"0 0 24 24",fill:"none",stroke:t.dim,strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round",style:{transition:"transform 0.15s",transform:open?"rotate(90deg)":"rotate(0deg)",flexShrink:0}},
    React.createElement("polyline",{points:"9 18 15 12 9 6"})
  );
  const inputSt={fontSize:11,color:t.text,background:t.card,border:`1px solid ${t.accent}`,borderRadius:4,padding:"1px 5px",width:"100%",fontFamily:"inherit",outline:"none"};

  const cancelCreate=()=>{ setCreating(null); setNewName(""); };

  // Dışarı tıklayınca iptal et
  useEffect(()=>{
    if(!creating)return;
    const handler=(e)=>{
      if(newNameRef.current&&!newNameRef.current.contains(e.target)){
        if(newName.trim())commitCreate();else cancelCreate();
      }
    };
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[creating,newName]);

  // Bir dosya satırı render eder (hem kök seviyede hem alt klasörlerde kullanılır)
  const renderFileRow=(f,depth)=>{
    const indent=depth*14+4;
    const ftype=FT[f.ft]||{color:"#6B7280"};
    const isSel=selFile?.id===f.id;
    const isRen=renamingId===f.id;
    return React.createElement("div",{key:f.id,
      className:"tree-file"+(isSel?" selected":""),
      onClick:()=>!isRen&&pickFile(f),
      onDoubleClick:()=>{setRenamingFolderPath(null);setRenamingId(f.id);setRenameVal(f.name);},
      onContextMenu:e=>openCtxMenu(e,'file',f),
      style:{gap:4,padding:`3px 4px 3px ${indent+20}px`,
        background:isSel?`${ftype.color}18`:undefined,
        borderLeft:`2px solid ${isSel?ftype.color:"transparent"}`}
    },
      React.createElement(FileIconSm,{color:ftype.color}),
      isRen
        ? React.createElement("input",{ref:renameRef,value:renameVal,
            onChange:e=>setRenameVal(e.target.value),style:{...inputSt,fontSize:11},
            onClick:e=>e.stopPropagation(),
            onKeyDown:e=>{if(e.key==="Enter")commitRename();if(e.key==="Escape")cancelRename();},
            onBlur:()=>setTimeout(cancelRename,150)
          })
        : React.createElement("span",{style:{fontSize:11,color:isSel?t.text:t.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}},f.name)
    );
  };

  // Bir düğümün alt klasörlerini VE dosyalarını birlikte alfabetik sıralayıp render eder.
  // (Önceden klasörler her zaman tüm dosyalardan önce listeleniyordu; bu da örn. D: kökünde
  // oluşturulan bir dosyanın, genişletilmiş kardeş klasörlerin tüm alt ağacının altına
  // "gömülmesine" ve sanki oluşturulmamış gibi görünmesine yol açıyordu.)
  const renderChildren=(node,depth)=>{
    const entries=[
      ...Object.keys(node.children).map(k=>({name:node.children[k].name,render:()=>renderNode(node.children[k],depth+1)})),
      ...node.files.map(f=>({name:f.name,render:()=>renderFileRow(f,depth)})),
    ];
    entries.sort((a,b)=>a.name.localeCompare(b.name,'tr',{sensitivity:'base',numeric:true}));
    return entries.map(e=>e.render());
  };

  const renderNode=(node,depth)=>{
    const isExp=expandedDirs.has(node.path)||depth===0;
    const indent=depth*14+4;
    const isRenFolder=renamingFolderPath===node.path;

    return React.createElement(React.Fragment,{key:node.path||"root"},
      depth>0&&React.createElement("div",{

        style:{gap:3,padding:`3px 4px 3px ${indent}px`}},
        React.createElement("div",{onClick:()=>!isRenFolder&&toggleDir(node.path),style:{display:"flex",alignItems:"center",gap:4,flex:1,minWidth:0,padding:"1px 0"}},
          React.createElement(ChevronIcon,{open:isExp}),
          React.createElement(FolderIcon,{open:isExp}),
          isRenFolder
            ? React.createElement("input",{ref:renameRef,value:renameVal,
                onChange:e=>setRenameVal(e.target.value),style:{...inputSt,fontSize:11.5},
                onClick:e=>e.stopPropagation(),
                onKeyDown:e=>{if(e.key==="Enter")commitRename();if(e.key==="Escape")cancelRename();},

        renderChildren(node,depth)

    );
  };

  const hasFiles=files.length>0;

  return React.createElement(React.Fragment,null,
    ctxMenu&&React.createElement(ContextMenu,{
      x:ctxMenu.x,y:ctxMenu.y,
      onClose:()=>setCtxMenu(null),
      items:ctxMenu.type==='folder'?[

      ]:[

        {label:"Yolu Kopyala",action:()=>navigator.clipboard.writeText(ctxMenu.item.path)},
        {label:"Klasörde Göster",action:()=>window.electronAPI?.showInFolder&&window.electronAPI.showInFolder(ctxMenu.item.path)},
        null,
        {label:"Sil",danger:true,action:()=>{if(confirm(`"${ctxMenu.item.name}" silinsin mi?`))onDelete&&onDelete(ctxMenu.item.id);}},
      ]
    }),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",padding:"5px 8px 4px",borderBottom:`1px solid ${t.border}`,flexShrink:0,gap:3}},
        React.createElement("span",{style:{fontSize:9,fontWeight:600,color:t.dim,textTransform:"uppercase",letterSpacing:"0.06em",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
          hasFiles?projectName.toUpperCase():"EXPLORER"
        ),

      ),
      React.createElement("div",{style:{flex:1,overflowY:"auto",overflowX:"hidden","--tree-hover":t.hover,"--tree-sel":"transparent"},
        onContextMenu:e=>{e.preventDefault();openCtxMenu(e,'folder',{path:''});}
      },
        hasFiles
          ? React.createElement(React.Fragment,null,
              creating&&creating.parentPath===''&&React.createElement(CreateInput,{indent:6,type:creating.type,value:newName,onChange:setNewName,onCommit:commitCreate,onCancel:cancelCreate,inputRef:newNameRef,t}),
              renderChildren(tree,0)
            )
          : React.createElement("div",{style:{padding:12,fontSize:11,color:t.dim,textAlign:"center",marginTop:8,lineHeight:1.6}},"Klasör açın")
      )
    )
  );
}

                  ].sort((a,b)=>(a.line||0)-(b.line||0))
                  .map(item=>{
                    const isM=q&&item.name.toLowerCase().includes(q.toLowerCase());
                    const canJump=item.line!=null&&selFile.code;
                    return React.createElement("span",{key:item.name+"_"+item.line,
                      onClick:canJump?()=>jumpToCode(item.line):undefined,
                      title:canJump?`Satır ${item.line}'a git`:undefined,
                      style:{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,padding:"3px 7px",borderRadius:4,fontFamily:"monospace",flexShrink:0,
                        background:isM?`${item.col}25`:t.card,border:`1px solid ${isM?item.col:t.border}`,color:isM?item.col:t.sub,cursor:canJump?"pointer":"default"}
                    },
                      React.createElement(Dot,{color:item.col,size:5}),
                      item.name,
                      canJump&&React.createElement("span",{style:{fontSize:9,color:t.dim}},`:${item.line}`)
                    );
                  })
                ),

                // ARAMA ÇUBUĞU
                selFile.code!=null&&React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderBottom:`1px solid ${t.border}`,background:t.surf,flexShrink:0}},
                  React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:6,padding:"0 8px",height:28}},
                    React.createElement("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:t.dim,strokeWidth:2,style:{flexShrink:0}},React.createElement("circle",{cx:11,cy:11,r:8}),React.createElement("line",{x1:21,y1:21,x2:16.65,y2:16.65})),
                    React.createElement("input",{
                      value:codeSearch,
                      onChange:e=>setCodeSearch(e.target.value),
                      placeholder:"Kod içinde ara...",
                      onKeyDown:e=>{
                        if(e.key==="Enter"){e.preventDefault();e.shiftKey?cmApiRef.current?.findPrev(codeSearch):cmApiRef.current?.findNext(codeSearch);}
                        if(e.key==="Escape"){setCodeSearch("");}
                      },
                      style:{flex:1,color:t.text,fontSize:11.5,fontFamily:"inherit",height:26}
                    }),
                    codeSearch&&React.createElement("span",{style:{fontSize:10,color:t.dim,whiteSpace:"nowrap",flexShrink:0}},`${matchInfo.count} eşleşme`),
                    codeSearch&&React.createElement("button",{onClick:()=>setCodeSearch(""),style:{display:"flex",flexShrink:0}},
                      React.createElement("svg",{width:11,height:11,viewBox:"0 0 24 24",fill:"none",stroke:t.dim,strokeWidth:2},React.createElement("line",{x1:18,y1:6,x2:6,y2:18}),React.createElement("line",{x1:6,y1:6,x2:18,y2:18}))
                    )
                  ),
                  codeSearch&&React.createElement("button",{onClick:()=>cmApiRef.current?.findPrev(codeSearch),title:"Önceki eşleşme (Shift+Enter)",style:{...S.iconBtn,height:28}},
                    React.createElement("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:t.sub,strokeWidth:2},React.createElement("line",{x1:12,y1:19,x2:12,y2:5}),React.createElement("polyline",{points:"5 12 12 5 19 12"}))
                  ),
                  codeSearch&&React.createElement("button",{onClick:()=>cmApiRef.current?.findNext(codeSearch),title:"Sonraki eşleşme (Enter)",style:{...S.iconBtn,height:28}},
                    React.createElement("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:t.sub,strokeWidth:2},React.createElement("line",{x1:12,y1:5,x2:12,y2:19}),React.createElement("polyline",{points:"19 12 12 19 5 12"}))
                  )
                ),

                // EDİTÖR
                selFile.code!=null
                  ?React.createElement("div",{style:{flex:1,overflow:"hidden",background:dark?"#0D1117":"#FFFFFF"}},
                      React.createElement(CodeEditor,{
                        fileId:selFile.id,fileName:selFile.name,fileCode:selFile.code,dark,
                        jumpTarget,searchQuery:codeSearch,
                        onDirty:()=>onDirtyRef.current&&onDirtyRef.current(),
                        apiRef:cmApiRef,saveKeyRef
                      })
                    )
                  :React.createElement("div",{style:{color:t.dim,fontSize:12,padding:16}},"Bu dosya türü için önizleme desteklenmiyor.")
              )
            )
          )
        ),
        React.createElement(TerminalPanel,{dark,t,selFile,open:termOpen,onToggle:()=>setTermOpen(o=>!o)})
      ),

      // AI SOHBET PANELİ — Copilot tarzı, sağdan açılır/kapanır
      React.createElement(AiPanel,{
        open:aiOpen,onClose:()=>setAiOpen(false),
        dark,t,aiConfig,onOpenSettings:()=>{setAiOpen(false);setSettingsOpen(true);},
        selFile,
      }),
    ),

    // SETTINGS MODAL
    settingsOpen&&React.createElement(SettingsModal,{
      dark,t,onClose:()=>setSettingsOpen(false),
      aiConfig,setAiConfig,
    }),

    // STATUS BAR
    React.createElement("footer",{style:S.statusbar},
      React.createElement("span",null,`📁 ${projectName}`),
      React.createElement("span",null,"·"),
      React.createElement("span",null,`${files.length} dosya`),
      files.length>0&&React.createElement("span",null,"·"),
      ...Object.entries(FT).map(([k,v])=>{
        const cnt=files.filter(f=>f.ft===k).length;
        return cnt>0?React.createElement("span",{key:k,style:{color:v.color}},`${v.label} ${cnt}`):null;
      }).filter(Boolean),
      React.createElement("span",{style:{marginLeft:"auto",color:selFile?fc.color:t.dim}},selFile?.name||"")
    )
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(error){ return {error}; }
  componentDidCatch(error, info){ console.error("App crashed:", error, info); }
  render(){
    if(this.state.error){
      return React.createElement("div",{style:{
        height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,
        background:"#0D1117",color:"#E6EDF3",fontFamily:"system-ui,sans-serif",padding:24,textAlign:"center"
      }},
        React.createElement("div",{style:{fontSize:18,fontWeight:600}},"Bir şeyler ters gitti"),
        React.createElement("div",{style:{fontSize:13,color:"#8B949E",maxWidth:560,lineHeight:1.6}},"Uygulama bir hatayla karşılaştı. Aşağıdaki mesajı geliştiriciye iletirseniz sorunu daha hızlı bulabiliriz:"),
        React.createElement("pre",{style:{fontSize:12,color:"#F87171",background:"#161B22",border:"1px solid #30363D",borderRadius:8,padding:14,maxWidth:640,maxHeight:240,overflow:"auto",textAlign:"left",whiteSpace:"pre-wrap"}},
          String(this.state.error && (this.state.error.stack||this.state.error.message||this.state.error))
        ),
        React.createElement("button",{onClick:()=>this.setState({error:null}),style:{padding:"8px 16px",borderRadius:6,background:"#7C3AED",color:"#fff",border:"none",fontSize:13,cursor:"pointer"}},"Tekrar Dene")
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
