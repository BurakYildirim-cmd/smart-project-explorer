<style>
*{box-sizing:border-box;margin:0;padding:0}
input{outline:none;border:none;background:none}
button{cursor:pointer;font-family:inherit;border:none;background:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sb,#30363D);border-radius:3px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
@keyframes jumpFlash{0%{background:rgba(124,58,237,0.45)}100%{background:rgba(124,58,237,0)}}
body{margin:0;overflow:hidden;height:100vh}
.cm-editor-host{height:100%;width:100%}
.cm-editor-host .CodeMirror{height:100%;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12.5px;line-height:1.65;background:transparent !important}
.cm-editor-host .CodeMirror-gutters{background:transparent !important;border-right:1px solid var(--cm-border,#30363D)}
.cm-editor-host .CodeMirror-linenumber{color:var(--cm-dim,#484F58)}
.cm-jump-flash{animation:jumpFlash 1.3s ease-out}
.cm-searching{background:rgba(247,195,30,0.35) !important;border-radius:2px}
.cm-search-current{background:rgba(247,195,30,0.7) !important;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<script>
const {useState,useMemo,useCallback,useRef,useEffect}=React;

const TH={
  dark:{bg:"#0D1117",surf:"#161B22",card:"#1C2128",hover:"#21262D",border:"#30363D",accent:"#7C3AED",acBg:"rgba(124,58,237,0.13)",text:"#E6EDF3",sub:"#8B949E",dim:"#484F58"},
  light:{bg:"#F6F8FA",surf:"#FFFFFF",card:"#F0F2F5",hover:"#E8EAED",border:"#D0D7DE",accent:"#7C3AED",acBg:"rgba(124,58,237,0.08)",text:"#1C2128",sub:"#57606A",dim:"#8C959F"}
};

const FT={
  python:{label:"Python",color:"#3B82F6"},
  javascript:{label:"JavaScript",color:"#F7DF1E"},
  typescript:{label:"TypeScript",color:"#3178C6"},
  json:{label:"JSON",color:"#F59E0B"},
  markdown:{label:"Markdown",color:"#10B981"},
  images:{label:"Görseller",color:"#EC4899"},
  audio:{label:"Ses",color:"#8B5CF6"},
  config:{label:"Config",color:"#F97316"},
  text:{label:"Metin",color:"#6B7280"}
};

function mapExtToMode(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  const m={
    py:'python',
    js:'javascript',jsx:'javascript',mjs:'javascript',cjs:'javascript',
    ts:'text/typescript',tsx:'text/typescript',
    json:{name:'javascript',json:true},
    md:'markdown',mdx:'markdown',
    html:'htmlmixed',htm:'htmlmixed',xml:'xml',svg:'xml',
    css:'css',
    yaml:'yaml',yml:'yaml',
    sh:'shell',bash:'shell',
  };
  return m[ext]||'text/plain';
}

function cmFindNext(cm,query){
  if(!query)return null;
  let cur=cm.getSearchCursor(query,cm.getCursor('to'),{caseFold:true});
  if(cur.findNext()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  cur=cm.getSearchCursor(query,{line:0,ch:0},{caseFold:true});
  if(cur.findNext()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  return null;
}
function cmFindPrev(cm,query){
  if(!query)return null;
  let cur=cm.getSearchCursor(query,cm.getCursor('from'),{caseFold:true});
  if(cur.findPrevious()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  const ll=cm.lastLine();
  cur=cm.getSearchCursor(query,{line:ll,ch:cm.getLine(ll).length},{caseFold:true});
  if(cur.findPrevious()){cm.setSelection(cur.from(),cur.to());cm.scrollIntoView({from:cur.from(),to:cur.to()},80);return cur.from();}
  return null;
}
function cmCountMatches(cm,query){
  if(!query)return 0;
  let n=0;const cur=cm.getSearchCursor(query,{line:0,ch:0},{caseFold:true});
  while(cur.findNext())n++;
  return n;
}
function makeSearchOverlay(query){
  const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp(esc,'gi');
  return {token(stream){
    re.lastIndex=stream.pos;
    const m=re.exec(stream.string);
    if(m&&m.index===stream.pos){stream.pos+=m[0].length||1;return 'searching';}
    else if(m){stream.pos=m.index;}
    else{stream.skipToEnd();}
  }};
}

function CodeEditor({fileId,fileName,fileCode,dark,jumpTarget,searchQuery,onDirty,apiRef,saveKeyRef}){
  const hostRef=useRef(null);
  const cmRef=useRef(null);
  const docsRef=useRef(new Map());
  const overlayRef=useRef(null);

  useEffect(()=>{
    const cm=CodeMirror(hostRef.current,{
      lineNumbers:true,
      theme:dark?'material-darker':'eclipse',
      matchBrackets:true,
      styleActiveLine:true,
      tabSize:2,
      viewportMargin:60,
      extraKeys:{
        "Ctrl-S":()=>{saveKeyRef&&saveKeyRef.current&&saveKeyRef.current();return false;},
        "Cmd-S":()=>{saveKeyRef&&saveKeyRef.current&&saveKeyRef.current();return false;},
      },
    });
    cmRef.current=cm;
    cm.on('change',()=>{ onDirty&&onDirty(); });
    if(apiRef)apiRef.current={
      getValue:()=>cm.getValue(),
      findNext:q=>cmFindNext(cm,q),
      findPrev:q=>cmFindPrev(cm,q),
      countMatches:q=>cmCountMatches(cm,q),
      focus:()=>cm.focus(),
    };
    return ()=>{cm.toTextArea&&cm.toTextArea();};
  },[]);

  useEffect(()=>{cmRef.current&&cmRef.current.setOption('theme',dark?'material-darker':'eclipse');},[dark]);

  useEffect(()=>{
    const cm=cmRef.current;
    if(!cm)return;
    let entry=docsRef.current.get(fileId);
    if(!entry){
      const mode=mapExtToMode(fileName||'');
      const doc=CodeMirror.Doc(fileCode||'',mode);
      entry={doc};
      docsRef.current.set(fileId,entry);
    }
    cm.swapDoc(entry.doc);
    requestAnimationFrame(()=>cm.refresh());
  },[fileId]);

  useEffect(()=>{
    const cm=cmRef.current;
    if(!cm||!jumpTarget)return;
    requestAnimationFrame(()=>{
      cm.refresh();
      const ln=Math.max(0,jumpTarget.line-1);
      cm.setCursor({line:ln,ch:0});
      cm.scrollIntoView({line:ln,ch:0},120);
      cm.addLineClass(ln,'background','cm-jump-flash');
      setTimeout(()=>{try{cm.removeLineClass(ln,'background','cm-jump-flash');}catch(e){}},1300);
      cm.focus();
    });
  },[jumpTarget]);

  useEffect(()=>{
    const cm=cmRef.current;
    if(!cm)return;
    if(overlayRef.current){cm.removeOverlay(overlayRef.current);overlayRef.current=null;}
    if(searchQuery){
      const ov=makeSearchOverlay(searchQuery);
      cm.addOverlay(ov);
      overlayRef.current=ov;
    }
  },[searchQuery,fileId]);

  return React.createElement("div",{ref:hostRef,className:"cm-editor-host"});
}

function App(){

  const[files,setFiles]=useState([]);
  const[selCat,setSelCat]=useState("all");
  const[selFile,setSelFile]=useState(null);
  const[q,setQ]=useState("");
  const[favs,setFavs]=useState(new Set());
  const[recent,setRecent]=useState([]);
  const[tab,setTab]=useState("preview");
  const[analyzing,setAnalyzing]=useState(false);
  const[aiText,setAiText]=useState(null);
  const[hovRow,setHovRow]=useState(null);
  const[hovCat,setHovCat]=useState(null);
  const[projectName,setProjectName]=useState("Smart Explorer");
  const[loading,setLoading]=useState(false);
  const[jumpTarget,setJumpTarget]=useState(null);
  const[codeSearch,setCodeSearch]=useState("");
  const[matchInfo,setMatchInfo]=useState({count:0,idx:0});
  const[dirtyIds,setDirtyIds]=useState(()=>new Set());
  const[saving,setSaving]=useState(false);
  const cmApiRef=useRef(null);

  const t=dark?TH.dark:TH.light;
  const fc=FT[selFile?.ft]||{label:"Dosya",color:"#6B7280"};

  const openFolder=async()=>{
    setLoading(true);
    try{
      const result=await window.electronAPI.openFolder();
      if(!result)return;
      setFiles(result);
      setSelFile(null);setAiText(null);setQ("");setSelCat("all");setRecent([]);
      if(result[0]){
        const parts=result[0].path.replace(/\\/g,'/').split('/');
        for(let i=parts.length-2;i>=0;i--){
          if(parts[i]&&!result[0].name.includes(parts[i])){setProjectName(parts[i]);break;}
        }
      }
    }finally{setLoading(false);}
  };

  const openSingleFile=async()=>{
    const f=await window.electronAPI.openFile();
    if(!f)return;
    setFiles(prev=>prev.find(x=>x.id===f.id)?prev:[...prev,f]);
    pickFile(f);
  };

  const shown=useMemo(()=>files.filter(f=>{
    if(selCat!=="all"&&f.ft!==selCat)return false;
    if(!q)return true;
    const ql=q.toLowerCase();
    if(f.name.toLowerCase().includes(ql))return true;
    if(f.ast?.classes.some(c=>c.name.toLowerCase().includes(ql)))return true;
    if(f.ast?.funcs.some(fn=>fn.name.toLowerCase().includes(ql)))return true;
    if(f.ast?.imports.some(im=>im.name.toLowerCase().includes(ql)))return true;
    return false;
  }),[files,selCat,q]);

  const pickFile=useCallback(f=>{
    setSelFile(f);setAiText(null);setTab("preview");setJumpTarget(null);setCodeSearch("");setMatchInfo({count:0,idx:0});
    setRecent(p=>[f.id,...p.filter(x=>x!==f.id)].slice(0,5));
  },[]);

  const jumpToCode=useCallback(line=>{
    setTab("code");
    setJumpTarget({line,t:Date.now()});
  },[]);

  const doSave=async()=>{
    if(!selFile||!cmApiRef.current)return;
    setSaving(true);
    try{
      const content=cmApiRef.current.getValue();
      const res=await window.electronAPI.saveFile(selFile.path,content);
      if(res?.ok){
        setDirtyIds(p=>{const n=new Set(p);n.delete(selFile.id);return n;});
        const updated={...selFile,code:content,lines:content.split('\n').length};
        setFiles(prev=>prev.map(f=>f.id===selFile.id?updated:f));
        setSelFile(updated);
      }
    }finally{setSaving(false);}
  };

  const toggleFav=useCallback((id,e)=>{
    e.stopPropagation();
    setFavs(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  },[]);

  const doAnalyze=async()=>{
    if(!selFile?.code)return;
    setAnalyzing(true);setAiText(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          messages:[{role:"user",content:`Kıdemli bir yazılım geliştirici olarak "${selFile.name}" dosyasını analiz et:\n\`\`\`\n${selFile.code}\n\`\`\`\n\n**Kod Kalitesi:** X/10\n**Güçlü Yönler:** (2-3 madde)\n**Dikkat Edilmesi Gerekenler:**\n**İyileştirme Önerileri:** (3 öneri)\n\nKısa, Türkçe.`}]
        })
      });
      const d=await res.json();
      setAiText(d.content?.[0]?.text||"Yanıt alınamadı.");
    }catch(err){setAiText(`Bağlantı hatası: ${err.message}`);}
    setAnalyzing(false);
  };

  const recentFiles=files.filter(f=>recent.includes(f.id)).sort((a,b)=>recent.indexOf(a.id)-recent.indexOf(b.id));
  const favFiles=files.filter(f=>favs.has(f.id));
  const catEntries=[["all","Tümü","#7C3AED"],...Object.entries(FT).map(([k,v])=>[k,v.label,v.color])];
  const isDirty=!!(selFile&&dirtyIds.has(selFile.id));

  const onDirtyRef=useRef(()=>{});
  useEffect(()=>{
    onDirtyRef.current=()=>{ if(selFile)setDirtyIds(p=>{ if(p.has(selFile.id))return p; const n=new Set(p);n.add(selFile.id);return n; }); };
  },[selFile]);

  const saveKeyRef=useRef(()=>{});
  useEffect(()=>{ saveKeyRef.current=()=>{ doSave(); }; });

  useEffect(()=>{
    if(!codeSearch){setMatchInfo({count:0});return;}
    const id=setTimeout(()=>{
      const c=cmApiRef.current?cmApiRef.current.countMatches(codeSearch):0;
      setMatchInfo({count:c});
    },150);
    return ()=>clearTimeout(id);
  },[codeSearch,selFile]);

  const svg=(d,size=14,col,extra={})=>React.createElement("svg",{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:col||t.sub,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",...extra},React.createElement("path",{d}));
  const StarIcon=(filled,col)=>React.createElement("svg",{width:11,height:11,viewBox:"0 0 24 24",fill:filled?col:"none",stroke:col,strokeWidth:2},React.createElement("polygon",{points:"12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"}));
  const ClockIcon=()=>svg("M12 2a10 10 0 100 20A10 10 0 0012 2zM12 6v6l4 2",11,t.dim);
  const ZapIcon=()=>svg("M13 2L3 14h9l-1 8 10-12h-9l1-8z",13,t.accent);
  const Dot=({color,size=7})=>React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:color,flexShrink:0}});

  const S={
    root:{display:"flex",flexDirection:"column",height:"100vh",background:t.bg,color:t.text,fontFamily:"'Inter',system-ui,sans-serif",fontSize:13,overflow:"hidden",userSelect:"none"},
    titlebar:{height:38,flexShrink:0,display:"flex",alignItems:"center",padding:"0 12px",gap:8,background:t.surf,borderBottom:`1px solid ${t.border}`,WebkitAppRegion:"drag"},
    header:{height:44,flexShrink:0,display:"flex",alignItems:"center",padding:"0 12px",gap:8,background:t.surf,borderBottom:`1px solid ${t.border}`},
    body:{flex:1,display:"flex",overflow:"hidden"},
    sidebar:{width:162,flexShrink:0,background:t.surf,borderRight:`1px solid ${t.border}`,display:"flex",flexDirection:"column",overflow:"hidden"},
    sideLabel:{padding:"8px 10px 3px",color:t.dim,fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"},
    filelist:{width:222,flexShrink:0,borderRight:`1px solid ${t.border}`,display:"flex",flexDirection:"column",overflow:"hidden"},
    preview:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0},
    statusbar:{height:24,flexShrink:0,display:"flex",alignItems:"center",padding:"0 12px",gap:10,background:t.surf,borderTop:`1px solid ${t.border}`,fontSize:10,color:t.dim},
    iconBtn:{width:28,height:28,background:t.card,border:`1px solid ${t.border}`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",WebkitAppRegion:"no-drag"},
    searchWrap:{flex:1,display:"flex",alignItems:"center",gap:6,background:t.card,border:`1px solid ${t.border}`,borderRadius:6,padding:"0 10px",height:30},
    ndrag:{WebkitAppRegion:"no-drag"},
  };

  const EmptyState=()=>React.createElement("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    React.createElement("div",{style:{width:72,height:72,borderRadius:18,background:t.acBg,border:`1px solid rgba(124,58,237,0.3)`,display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("svg",{width:32,height:32,viewBox:"0 0 24 24",fill:"none",stroke:t.accent,strokeWidth:1.5},React.createElement("path",{d:"M3 3h6l2 3h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"}))
    ),
    React.createElement("div",{style:{fontSize:18,fontWeight:600,color:t.text}},"Smart Project Explorer"),
    React.createElement("div",{style:{fontSize:13,color:t.sub,textAlign:"center",maxWidth:320,lineHeight:1.6}},
      "Projenizi keşfetmek için bir klasör açın,",React.createElement("br"),"ya da doğrudan tek bir dosya açın."
    ),
    React.createElement("div",{style:{display:"flex",gap:10,marginTop:4}},
      React.createElement("button",{onClick:openFolder,style:{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",borderRadius:7,fontSize:13,fontWeight:500,background:t.accent,color:"#fff",border:`1px solid ${t.accent}`,cursor:"pointer"}},
        svg("M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",14,"#fff"),"Klasör Aç"
      ),
      React.createElement("button",{onClick:openSingleFile,style:{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",borderRadius:7,fontSize:13,fontWeight:500,background:t.card,color:t.text,border:`1px solid ${t.border}`,cursor:"pointer"}},
        svg("M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z",14,t.sub),"Dosya Aç"
      )
    )
  );

  return React.createElement("div",{style:S.root},

    // TITLEBAR — Windows style: logo+actions left, window controls right
    React.createElement("div",{style:S.titlebar},
      // Logo + proje adı
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,...S.ndrag}},
        React.createElement("div",{style:{width:18,height:18,background:t.accent,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          React.createElement("svg",{width:10,height:10,viewBox:"0 0 24 24",fill:"white"},React.createElement("path",{d:"M3 3h18v2H3zM3 7h12v2H3zM3 11h18v2H3zM3 15h12v2H3zM3 19h18v2H3z"}))
        ),
        React.createElement("span",{style:{fontSize:12,color:t.sub,fontWeight:500}},projectName)
      ),
      // Dosya/Klasör aç butonları
      React.createElement("div",{style:{display:"flex",gap:4,marginLeft:12,...S.ndrag}},
        React.createElement("button",{onClick:openSingleFile,style:{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:500,border:`1px solid ${t.border}`,color:t.sub,background:t.card,cursor:"pointer"}},
          svg("M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z",11,t.sub),"Dosya Aç"
        ),
        React.createElement("button",{onClick:openFolder,style:{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:500,border:`1px solid ${t.accent}`,color:t.accent,background:t.acBg,cursor:"pointer"}},
          svg("M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",11,t.accent),"Klasör Aç"

      React.createElement("div",{style:{marginLeft:"auto",display:"flex",...S.ndrag}},

        },
          React.createElement("svg",{width:10,height:1,viewBox:"0 0 10 1"},React.createElement("rect",{width:10,height:1,fill:"currentColor"}))
        ),
        // Tam ekran / Geri al
        React.createElement("button",{
          onClick:()=>window.electronAPI.maximize(),
          title:"Tam Ekran",
          onMouseEnter:e=>{e.currentTarget.style.background=dark?"#21262D":"#E8EAED"},
          onMouseLeave:e=>{e.currentTarget.style.background="transparent"},
          style:{width:46,height:38,display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:t.sub,cursor:"pointer",transition:"background .15s"}
        },
          React.createElement("svg",{width:10,height:10,viewBox:"0 0 10 10",fill:"none",stroke:"currentColor",strokeWidth:1},React.createElement("rect",{x:0.5,y:0.5,width:9,height:9}))
        ),
        // Kapat
        React.createElement("button",{
          onClick:()=>window.electronAPI.close(),
